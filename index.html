<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neurobloom</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%233b2f57'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%23f6d785'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1a1426;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      }
      #game-root {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
      }
      /* Phaser injects its canvas here; keep it crisp for pixel art. */
      #game-root canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        box-shadow: 0 0 40px rgba(120, 90, 200, 0.35);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
