<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neurobloom</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1a1426;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      }
      #game-root {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
      }
      /* Phaser injects its canvas here; keep it crisp for pixel art. */
      #game-root canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        box-shadow: 0 0 40px rgba(120, 90, 200, 0.35);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
